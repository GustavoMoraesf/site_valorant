<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Valorant Universe</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="./js/sessao.js"></script>
</head>
<body>
    <div class="pag_login">
        <div class="formulario">
            <img class="icon" src="../assets/icon/icon2.png" alt="">
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_user.png" alt="">
                <input class="campo" type="text" placeholder="Nome" id="ipt_nome">
            </div>
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_email.png" alt="">
                <input class="campo" type="text" placeholder="Email" id="ipt_email">
            </div>
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_senha.png" alt="">
                <input class="campo" type="password" placeholder="Senha" id="ipt_senha">
                <img id="olho" class="icon-dir" src="../assets/imgs/icon_olho.png" alt="">
            </div>
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_senha.png" alt="">
                <input class="campo" type="password" placeholder="Confirmar Senha" id="ipt_senha2">
                <img id="olho2" class="icon-dir" src="../assets/imgs/icon_olho.png" alt="">
            </div>
            <button class="confirmar" onclick="cadastrar()">CADASTRAR</button>
            <div class="mensagem" id="div_msg"></div>
            <div class="cadastro">
                <span>Já tem uma conta?</span>
                <a href="login.html">Entrar</a>
            </div>
        </div>
    </div>
</body>
</html>

<script>
    let senha_olho = document.getElementById("ipt_senha");
    let olho = document.getElementById("olho");
    let senha2_olho = document.getElementById("ipt_senha2");
    let olho2 = document.getElementById("olho2");

    function mostrarSenha(){
        if (senha_olho.type === "password") {
            senha_olho.type = "text";
        } else {
            senha_olho.type = "password";
        }
    }

    olho.addEventListener("click", mostrarSenha);

    function mostrarSenha2(){
        if (senha2_olho.type === "password") {
            senha2_olho.type = "text";
        } else {
            senha2_olho.type = "password";
        }
    }

    olho2.addEventListener("click", mostrarSenha2);


    function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    let nomeVar = ipt_nome.value
    let emailVar = ipt_email.value
    let senhaVar = ipt_senha.value 
    let senha2Var = ipt_senha2.value
    let campos = [nomeVar, emailVar, senhaVar, senha2Var];
    let temEspecial = false;
    let especiais = "!@#$%^&*()_+-=[]{}|;:'\",.<>?/";


    for (let i = 0; i < campos.length; i++) {
      if (campos[i] == "") {
        div_msg.innerHTML = `<span style="color: red;">Preencha todos os campos</span>`;
        return false;
      }
    }

    for (let i = 0; i < senhaVar.length; i++) {
      if (especiais.includes(senhaVar[i])) {
        temEspecial = true;
        break;
      }
    }

    if (!emailVar.includes('@') || !emailVar.includes('.')){
        div_msg.innerHTML = `Insira um <span style="color: red;"> email válido </span>`
        return false
    } else if(senhaVar.length < 8){
        div_msg.innerHTML = `A senha deve ter no <span style="color: red;"> mínimo 8 caracteres </span>`
        return false
    } else if(senhaVar == senhaVar.toUpperCase()){
        div_msg.innerHTML = `A senha deve ter letras <span style="color: red;"> minúsculas </span>`
        return false
    } else if(senhaVar == senhaVar.toLowerCase()){
        div_msg.innerHTML = `A senha deve ter letras <span style="color: red;"> maiúsculas </span>`
        return false
    } else if (!temEspecial) {
        div_msg.innerHTML = `A senha deve ter pelo menos <span style="color: red;">1 caractere especial</span>`;
        return false;
    } else if (senhaVar != senha2Var){
        div_msg.innerHTML = `As senhas devem ser <span style="color: red;"> iguais </span>`
        return false
    } else {
        div_msg.innerHTML = ``
        setInterval(5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert("Cadastro realizado com sucesso! Redirecionando para tela de Login...")

          setTimeout(() => {
            window.location = "login.html";
          }, "1000");

          limparFormulario();
        } else {
          div_msg.innerHTML = `<span style="color: red;"> Email já cadastrado! </span>`
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
    
      return false;
  }

  function limparFormulario(){
    nomeVar.value = ''
    emailVar.value = ''
    senhaVar.value = ''
    senha2Var.value = ''
  }

</script>
