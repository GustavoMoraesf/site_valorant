<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Valorant Universe</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="./js/sessao.js"></script>
</head>
<body>
    <div class="pag_login">
        <div class="formulario">
            <img class="icon" src="../assets/icon/icon2.png" alt="">
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_email.png" alt="">
                <input class="campo" type="text" placeholder="Email" id="email_input">
            </div>
            <div class="input-box">
                <img class="icon-esq" src="../assets/imgs/icon_senha.png" alt="">
                <input id="senha_input" class="campo" type="password" placeholder="Senha">
                <img id="olho" class="icon-dir" src="../assets/imgs/icon_olho.png" alt="">
            </div>
            <button class="confirmar" onclick="entrar()">ENTRAR</button>
            <div style="color: white;" id="div_msg"></div>
            <div class="cadastro">
                <span>Não tem uma conta?</span>
                <a href="cadastro.html">Cadastre-se</a>
            </div>
        </div>
    </div>
</body>
</html>

<script>
    let senha = document.getElementById("senha_input");
    let olho = document.getElementById("olho");

    function mostrarSenha() {
        if (senha.type === "password") {
            senha.type = "text";
        } else {
            senha.type = "password";
        }
    }

    olho.addEventListener("click", mostrarSenha);

    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            div_msg.innerHTML = "Preencha todos os campos";
            return false;
        }
        else {
            setInterval(2000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUser;

                    setTimeout(function () {
                        console.log('vou redirecionar')
                        window.location = "./user_login/index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");
                div_msg.innerHTML = "Email e/ou senha inválidos"
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
