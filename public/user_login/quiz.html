<script>
    window.onload = function() {
        quiz();
    };

    nome_user.innerHTML = sessionStorage.NOME_USUARIO

    function quiz(){

        let listaPerguntas = [
            '1. Como você prefere começar uma rodada?',
            '2. Qual dessas frases mais combina com você?',
            '3. Seu estilo de jogo é mais…',
            '4. O que você faz quando o time está em desvantagem?',
            '5. Qual habilidade você acha mais útil?',
            '6. Em um clutch (1vX), você…',
            '7. Qual papel você assume naturalmente em jogos em equipe?',
            '8. Você prefere mapas…',
            '9. O que te dá mais satisfação?',
            '10. Como seus amigos te descreveriam?'
        ];

        let listaResposta1 = [
            'A) Indo pra cima e buscando o primeiro abate',
            'A) “Eu entro primeiro, confia.”',
            'A) Agressivo e rápido',
            'A) Tenta virar com jogadas ousadas',
            'A) Mobilidade (dash, salto, etc.)',
            'A) Vai pra cima sem medo',
            'A) O protagonista da ação',
            'A) Com rotas rápidas pra atacar',
            'A) Fazer várias eliminações',
            'A) Impulsivo e habilidoso'
        ];

        let listaResposta2 = [
            'B) Preparando o terreno com smokes',
            'B) "Calma, deixa eu organizar o mapa."',
            'B) Estratégico e calculado',
            'B) Controla espaço pra recuperar o round',
            'B) Bloquear visão do inimigo',
            'B) Usa utilitários pra controlar o mapa',
            'B) O estrategista',
            'B) Onde dá pra controlar entradas',
            'B) Executar um plano perfeito',
            'B) Inteligente e estratégico'
        ];

        let listaResposta3 = [
            'C) Abrindo espaço com utilitários de informação',
            'C) “Vou cegar eles, entra depois.”',
            'C) Tático e de suporte',
            'C) Busca informação antes de agir',
            'C) Revelar posição inimiga',
            'C) Tenta pegar info antes de agir',
            'C) O facilitador',
            'C) Com várias possibilidades de informação',
            'C) Ajudar o time a entrar com segurança',
            'C) Comunicativo e útil'
        ];

        let listaResposta4 = [
            'D) Segurando o avanço inimigo',
            'D) “Relaxa, esse bomb tá seguro.”',
            'D) Paciente e defensivo',
            'D) Se posiciona bem pra segurar o avanço',
            'D) Proteger área ou aliados',
            'D) Joga no tempo e posicionamento',
            'D) O defensor',
            'D) Com pontos fortes pra defesa',
            'D) Parar o avanço inimigo sozinho',
            'D) Confiável e consistente'
        ];
        
        let duelista = 0;
        let controlador = 0;
        let iniciador = 0;
        let sentinela = 0;

        let contador = 0;

        let txt_pergunta = document.getElementById('txt_pergunta');
        let txt_resposta1 = document.getElementById('txt_resposta1');
        let txt_resposta2 = document.getElementById('txt_resposta2');
        let txt_resposta3 = document.getElementById('txt_resposta3');
        let txt_resposta4 = document.getElementById('txt_resposta4');

        let respostaA = document.getElementById('res1');
        let respostaB = document.getElementById('res2');
        let respostaC = document.getElementById('res3');
        let respostaD = document.getElementById('res4');

        function atualizarPergunta() {
            txt_pergunta.innerHTML = listaPerguntas[contador];
            txt_resposta1.innerHTML = listaResposta1[contador];
            txt_resposta2.innerHTML = listaResposta2[contador];
            txt_resposta3.innerHTML = listaResposta3[contador];
            txt_resposta4.innerHTML = listaResposta4[contador];
        }

        function verificarFim() {
            if (contador >= listaPerguntas.length) {

                let maior = Math.max(duelista, controlador, iniciador, sentinela);

                // Enviando o valor da nova input
                fetch("/quiz/quizPontuacao", {
                method: "POST", 
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    ptDuelista: duelista,
                    ptControlador: controlador,
                    ptIniciador: iniciador,
                    ptSentinela: sentinela,
                    fkUser: sessionStorage.ID_USUARIO 
                }),
                })
                .then(function (resposta) {
                    console.log("resposta: ", resposta);

                    if (resposta.ok) {
                        console.log('Dados do quiz cadastrados!')
                    } else {
                        throw "Houve um erro ao tentar realizar o cadastro!";
                        return false
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                });
            

                let resultado = "";
                let imagem = "";
                let descricao = "";

            if (maior == duelista) {
                resultado = "Duelista";
                imagem = "../assets/imgs/duelistas.jpg";
                descricao = "Você é agressivo, confiante e gosta de liderar ataques.";
            } 
            else if (maior == controlador) {
                resultado = "Controlador";
                imagem = "../assets/imgs/controladores.jpg";
                descricao = "Você domina o mapa e pensa estrategicamente.";
            } 
            else if (maior == iniciador) {
                resultado = "Iniciador";
                imagem = "../assets/imgs/iniciadores.png";
                descricao = "Você abre caminho para o time com inteligência.";
            } 
            else {
                resultado = "Sentinela";
                imagem = "../assets/imgs/sentinelas.webp";
                descricao = "Você protege o time e controla o território.";
            }

            document.querySelector('.pag_quiz').style.display = 'none';
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('titulo_resultado').innerHTML = "Você é " + resultado + "!";
            document.getElementById('img_resultado').src = imagem;
            document.getElementById('desc_resultado').innerHTML = descricao;
        }
}

        respostaA.addEventListener('click', function() {
            duelista++;
            contador++;
            verificarFim();
            if (contador < listaPerguntas.length) {
                atualizarPergunta();
            } 
        });

        respostaB.addEventListener('click', function() {
            controlador++;
            contador++;
            verificarFim();
            if (contador < listaPerguntas.length) {
                atualizarPergunta();
            } 
        });

        respostaC.addEventListener('click', function() {
            iniciador++;
            contador++;
            verificarFim();
            if (contador < listaPerguntas.length) {
                atualizarPergunta();
            } 
        });

        respostaD.addEventListener('click', function() {
            sentinela++;
            contador++;
            verificarFim();
            if (contador < listaPerguntas.length) {
                atualizarPergunta();
            } 
        });

        atualizarPergunta();
    }

    
</script>
